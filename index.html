  <title>Updated Color Scheme</title>
  <style>
    /* New Color Definitions */
    :root {
      --teal: #0080B1;
      --light-teal: #00BCBE;
      --deep-teal: #007879;
    }

    /* General Styles */
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--light-teal);
      color: var(--deep-teal);
    }

    .framer-text {
      font-family: 'Dallas PS Sans Reg', 'Dallas PS Sans Reg Placeholder', sans-serif;
      font-size: 68px;
      line-height: 0.7em;
      text-align: center;
      color: var(--teal);
    }

    .framer-text span {
      color: var(--deep-teal);
    }

    .framer-image {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .framer-link {
      text-decoration: none;
      color: var(--teal);
      transition: color 0.3s ease;
    }

    .framer-link:hover {
      color: var(--deep-teal);
    }

    .framer-button {
      background-color: var(--teal);
      color: white;
      border: none;
      padding: 16px 32px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .framer-button:hover {
      background-color: var(--deep-teal);
    }

    .framer-icon {
      fill: var(--teal);
      transition: fill 0.3s ease;
    }

    .framer-icon:hover {
      fill: var(--deep-teal);
    }

    /* Specific Component Styles */
